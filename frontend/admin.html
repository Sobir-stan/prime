<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; }
        input { width: 100%; padding: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .promo-item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .deactivate { background-color: red; color: white; }
        .activate { background-color: green; color: white; }
    </style>
</head>
<body>
    <h1>Admin Panel - Promokod Boshqaruv</h1>

    <h2>Yangi Promokod Yaratish</h2>
    <div class="form-group">
        <label for="code">Promokod:</label>
        <input type="text" id="code" placeholder="Masalan: WELCOME10">
    </div>
    <div class="form-group">
        <label for="cookies">Pecheniye soni:</label>
        <input type="number" id="cookies" placeholder="10000">
    </div>
    <div class="form-group">
        <label for="usage_limit">Ishlatish limiti:</label>
        <input type="number" id="usage_limit" placeholder="10">
    </div>
    <button onclick="createPromo()">Promokod yaratish</button>

    <h2>Promokodlar Ro'yxati</h2>
    <div id="promoList"></div>

    <script>
        // Admin check
        async function checkAdminAccess() {
            try {
                const response = await fetch('/check_admin');
                if (!response.ok) {
                    alert('Siz admin emassiz!');
                    window.location.href = '/';
                    return;
                }
                const data = await response.json();
                if (!data.is_admin) {
                    alert('Siz admin emassiz!');
                    window.location.href = '/';
                }
            } catch (e) {
                alert('Admin tekshirishda xatolik!');
                window.location.href = '/';
            }
        }

        async function loadPromos() {
            const response = await fetch('/promo/list');
            const promos = await response.json();
            const list = document.getElementById('promoList');
            list.innerHTML = '';
            promos.forEach(promo => {
                const item = document.createElement('div');
                item.className = 'promo-item';
                item.innerHTML = `
                    <p>${promo.code} - 🍪 ${promo.cookies} pecheniye<br>
                    Ishlatildi: ${promo.used_count} marta (Limit: ${promo.usage_limit})</p>
                    <button class="${promo.active ? 'deactivate' : 'activate'}" onclick="togglePromo('${promo.code}')">
                        ${promo.active ? 'Faolsizlantirish' : 'Faollashtirish'}
                    </button>
                `;
                list.appendChild(item);
            });
        }

        async function createPromo() {
            const code = document.getElementById('code').value.trim().toUpperCase();
            const cookies = parseFloat(document.getElementById('cookies').value);
            const usage_limit = parseInt(document.getElementById('usage_limit').value);

            if (!code || !cookies || !usage_limit) {
                alert('Barcha maydonlarni to\'ldiring');
                return;
            }

            const response = await fetch('/promo/create_promo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, cookies, usage_limit })
            });

            if (response.ok) {
                alert('Promokod yaratildi');
                loadPromos();
                document.getElementById('code').value = '';
                document.getElementById('cookies').value = '';
                document.getElementById('usage_limit').value = '';
            } else {
                const error = await response.json();
                alert(error.detail);
            }
        }

        async function togglePromo(code) {
            const response = await fetch(`/promo/active_promo/${code}`, { method: 'PUT' });
            if (response.ok) {
                loadPromos();
            } else {
                alert('Xatolik');
            }
        }

        // Page load qilganda admin check qil
        checkAdminAccess();
        loadPromos();
    </script>
</body>
</html>
