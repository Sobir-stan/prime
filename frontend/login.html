<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Prime App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-size: 1.875rem;
            font-weight: 700;
            text-align: center;
        }

        p.subtitle {
            margin-bottom: 2rem;
            color: var(--text-muted);
            text-align: center;
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-color);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .error-msg {
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Ro'yxatdan o'tish</h2>
        <p class="subtitle">Ro'yxatdan o'tish uchun quyidagi formani to'ldiring</p>

        <div class="form-group">
            <label for="username">Ismiz</label>
            <input type="text" id="username" placeholder="Ali" required>
        </div>

        <div class="form-group">
            <label for="email">Email Adres</label>
            <input type="email" id="email" placeholder="ali@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Parol</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="confirm_password">Parolni tasdiqlang</label>
            <input type="password" id="confirm_password" placeholder="••••••••" required>
            <div id="password-error" class="error-msg">Parol bir xil emas</div>
        </div>

        <button class="btn" onclick="registerUser()">Ro'yxatdan o'tish</button>
    </div>

    <script src="/static/scripts/scripts.js"></script>

</body>

</html>
