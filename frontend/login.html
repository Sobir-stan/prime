<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Prime App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #111827;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.1);
            --primary-color: #fbbf24;
            --primary-hover: #f59e0b;
            --input-bg: rgba(0, 0, 0, 0.2);
            --error-color: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #1f2937, var(--bg-color));
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 1rem;
            border: 1px solid var(--panel-border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* Decorative background elements */
        .decoration {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.15), transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        .decoration-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -150px;
        }

        .decoration-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            right: -100px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #fbbf24, #d97706);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            margin-bottom: 2rem;
            color: var(--text-muted);
            text-align: center;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-color);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--panel-border);
            border-radius: 0.5rem;
            font-size: 1rem;
            color: var(--text-color);
            transition: all 0.2s;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        input::placeholder {
            color: #6b7280;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: #111827;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 1rem;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            box-shadow: 0 6px 12px rgba(251, 191, 36, 0.2);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            margin-top: 0.75rem;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-text {
            background: none;
            color: var(--text-muted);
            padding: 0.5rem;
            margin-top: 0.75rem;
            font-size: 0.85rem;
            font-weight: 500;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
            font-family: 'Outfit', sans-serif;
        }

        .btn-text:hover {
            color: var(--text-color);
            text-decoration: underline;
        }

        .error-msg {
            color: var(--error-color);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
            font-weight: 500;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem;
            border-radius: 0.25rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            transition: opacity 0.3s;
        }

        .success-msg {
            color: #10b981;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
            font-weight: 500;
            background: rgba(16, 185, 129, 0.1);
            padding: 0.5rem;
            border-radius: 0.25rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
            transition: opacity 0.3s;
        }
    </style>
</head>

<body>

    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>

    <div class="container">
        <h2>Kirish</h2>
        <p class="subtitle">Tizimga kirish uchun ma'lumotlarni kiriting</p>

        <div id="global-notification" class="error-msg" style="margin-bottom: 1rem;"></div>

        <div class="form-group">
            <label for="login_username">Ismiz / Username</label>
            <input type="text" id="login_username" placeholder="Ali" required>
        </div>

        <div class="form-group">
            <label for="login_password">Parol</label>
            <input type="password" id="login_password" placeholder="••••••••" required>
        </div>

        <div id="login-error" class="error-msg">Noto'g'ri ism yoki parol kiritildi</div>

        <button class="btn" onclick="loginUser()">Kirish (Login)</button>
        <button class="btn btn-secondary" onclick="window.location.href='register '">Ro'yxatdan o'tish
            (Register)</button>
        <button class="btn-text" onclick="forgotPassword()">Parolni unutdingizmi? (Forgot password)</button>
    </div>

    <script src="/static/scripts/scripts.js?v=2"></script>

    <script>
        // Telegram ID ni URL dan olish
        const urlParams = new URLSearchParams(window.location.search);
        const tgId = urlParams.get('tg_id');
        if (tgId) {
            localStorage.setItem('tg_id_temp', tgId);
            // Login sahifasida qolish, registerga o'tkazmaslik
            // window.location.href = `/register?tg_id=${tgId}`;
        }
    </script>

</body>

</html>
